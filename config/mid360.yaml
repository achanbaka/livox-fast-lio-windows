common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 4
    blind: 0.5
    feature_enabled: false
    point_filter_num: 3

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    max_iteration: 3
    max_feature_points: 2000
    iekf_match_threads: 4       # parallel nearest-neighbor matching threads
    filter_size_surf: 0.5
    filter_size_map: 0.5
    cube_side_length: 1000
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false     # true: enable the online estimation of IMU-LiDAR extrinsic
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame
    publish_full_map: true       # true: /map keeps the full replay map for Foxglove and output bag
    async_full_map_publish: true # build and publish full-map snapshots outside the SLAM thread
    full_map_publish_interval_ms: 1000
    full_map_voxel_size: 0.2     # independent voxel size for full-map output
    bag_full_map_periodic: false # false: write one final /map message when the run ends
    publish_map_delta: false     # experimental: publish newly accepted map voxels on /map_delta
    map_delta_max_pending_points: 200000
    foxglove_control_interval_ms: 20  # smooth Foxglove playback clock (up to 50 Hz)
    foxglove_backlog_size: 64

map_output:
    mode: full_async              # full_async | tiled_incremental | hybrid
    full_publish_interval_ms: 1000 # matches legacy publish.full_map_publish_interval_ms
    full_voxel_leaf_m: 0.2        # matches legacy publish.full_map_voxel_size
    tile_size_m: 20.0
    tile_voxel_leaf_m: 0.2
    voxel_update_policy: latest   # first | latest | centroid
    tile_publish_hz: 10
    max_tiles_per_update: 32
    max_points_per_update: 200000 # matches legacy publish.map_delta_max_pending_points
    input_queue_capacity: 64
    input_queue_max_mb: 128
    max_memory_mb: 1024
    memory_policy: stop_accumulating # spill_to_disk is not enabled until its on-disk format lands

foxglove:
    current_cloud_publish_hz: 20
    path_publish_hz: 2
    backlog_size: 64              # matches legacy publish.foxglove_backlog_size

storage:
    mode: realtime                # realtime | reliable
    queue_max_mb: 512
    bag_path_publish_hz: 1
    path_max_points: 100000       # bounded rolling Path; Odom remains complete
    pcd_format: binary_compressed
    pcd_chunk_points: 1000000
    pcd_chunk_frames: 0
    save_final_ikdtree: true

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file;
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

runtime:
    runtime_pos_log_enable: false
