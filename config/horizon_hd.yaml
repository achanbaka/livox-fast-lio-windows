common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    livox_broadcast_code: ""    # optional: set Horizon broadcast code to lock onto one device
    realtime_frame_sec: 0.10    # seconds accumulated into one FAST-LIO frame in live mode
    realtime_frame_points: 30000
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 1
    scan_line:  6
    blind: 4
    feature_enabled: false
    point_filter_num: 1         # keep more Livox points for high-density mapping

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    max_iteration: 4
    max_feature_points: 4000
    iekf_match_threads: 4       # best total pipeline throughput on tested 8C/16T CPU
    # filter_size_surf: 0.2       # current-frame voxel leaf size, meters
    # filter_size_map: 0.2        # ikd-Tree/map voxel leaf size, meters
    filter_size_surf: 0.05       # current-frame voxel leaf size, meters
    filter_size_map: 0.05        # ikd-Tree/map voxel leaf size, meters
    cube_side_length: 1000
    fov_degree:    100
    det_range:     260.0
    extrinsic_est_en:  true
    extrinsic_T: [ 0.05512, 0.02226, -0.0297 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: true
    publish_full_map: true
    async_full_map_publish: true
    full_map_publish_interval_ms: 5000
    full_map_voxel_size: 0.2    # keep visualization snapshots bounded while SLAM remains at 0.05 m
    bag_full_map_periodic: false
    publish_map_delta: true      # legacy compatibility; map_output.mode is authoritative
    map_delta_max_pending_points: 200000
    foxglove_control_interval_ms: 20  # smooth Foxglove playback clock (up to 50 Hz)
    foxglove_backlog_size: 64

map_output:
    mode: hybrid                 # persistent SceneUpdate Tiles plus a compatibility PointCloud snapshot
    full_publish_interval_ms: 5000 # low-rate /map snapshot; a new client still triggers an immediate resync
    full_voxel_leaf_m: 0.2        # matches legacy publish.full_map_voxel_size
    tile_size_m: 20.0
    tile_voxel_leaf_m: 0.2
    voxel_update_policy: latest   # first | latest | centroid
    tile_publish_hz: 10
    max_tiles_per_update: 32
    max_points_per_update: 200000 # matches legacy publish.map_delta_max_pending_points
    input_queue_capacity: 64
    input_queue_max_mb: 128
    max_memory_mb: 1024
    memory_policy: stop_accumulating # spill_to_disk is not enabled until its on-disk format lands

foxglove:
    current_cloud_publish_hz: 20
    path_publish_hz: 2
    backlog_size: 64              # matches legacy publish.foxglove_backlog_size

storage:
    mode: realtime                # realtime | reliable
    queue_max_mb: 512
    bag_path_publish_hz: 1
    path_max_points: 100000       # bounded rolling Path; Odom remains complete
    pcd_format: binary_compressed
    pcd_chunk_points: 1000000
    pcd_chunk_frames: 0
    save_final_ikdtree: true

pcd_save:
    pcd_save_en: true
    interval: -1

runtime:
    runtime_pos_log_enable: false
